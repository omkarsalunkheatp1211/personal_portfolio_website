<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="images/x-icon" href="omkar.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <div class="left">Omkar's Portfolio</div>
            <div class="right">
                <ul>
                    <li> <a href="index.html"> Home </a></li>
                    <li> <a href="about.html"> About </a></li>
                    <!-- <li> <a href="Services.html"> Services </a></li> -->
                    <li> <a href="Projects.html"> Projects </a></li>
                    <!-- <li> <a href="Contact.html"> Contact Me </a> </li> -->
                    <li class="login-button"><a href="login.html">Login</a></li>
                    <li class="signup-button"><a href="signup.html">Signup</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="container">
        <div class="form">
            <h2>Signup</h2>
            <!-- Signup Section -->
            <div id="signup">
                <form>
                    <div class="input-group">
                        <label for="signup-firstname">Full Name</label>
                        <input type="text" id="signup-fullname" name="signup-fullname" required>
                    </div>
                    <div class="input-group">
                        <label for="signup-dob">Date of Birth</label>
                        <input type="date" id="signup-dob" name="signup-dob" required>
                    </div>
                    <div class="input-group">
                        <label for="signup-address">Address</label>
                        <input type="text" id="signup-address" name="signup-address" required>
                    </div>

                    <div class="input-group">
                        <label for="signup-email">Email ID</label>
                        <input type="email" id="signup-email" name="signup-email" required>
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="signup-password" required>
                    </div>
                    <div class="button-group">
                        <button type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <footer class="footer">
        <h3>Omkar's Developer Portfolio</h3>
        <p>www.omkarsPortfolop.com | All rights reserved</p>
    </footer>
    <script>
        function togglePasswordVisibility(passwordFieldId) {
            var passwordField = document.getElementById(passwordFieldId);
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
            } else {
                passwordField.type = 'password';
            }
        }
    </script>
</body>

</html>
