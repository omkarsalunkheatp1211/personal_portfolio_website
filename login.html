    <div class="container">
        <div class="form">
            <h2>Login</h2>
            <!-- Login Section -->
            <div id="login">
                <form onsubmit="validateLogin(event)">
                    <div class="input-group">
                        <label for="login-username">Username or Email ID</label>
                        <input type="text" id="login-username" name="login-username" required placeholder="omkar">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="password-input">
                            <input type="password" id="login-password" name="login-password" required
                                placeholder="Qwerty@123">
                            <span id="password-toggle" class="password-toggle">Show/Hide Password</span>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="reset">Reset</button>
                        <button type="submit">Submit</button>
                    </div>
                </form>
                <div id="login-message"></div>
            </div>
        </div>
    </div>
